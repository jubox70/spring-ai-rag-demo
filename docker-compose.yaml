services:
  pgvector:
    image: pgvector/pgvector:pg17
    container_name: pgvector
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: password
      POSTGRES_DB: pgvector_db
    volumes:
      - pgvector_data:/var/lib/postgresql/data

volumes:
  pgvector_data: